services:
  db:
    image: mysql:latest
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: whats_due
    ports:
      - "3307:3306"  
    volumes:
      - db_data:/var/lib/mysql

  backend:
    image: nicolasbernal1/backend-wdt:1
    container_name: backend_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: whats_due
    depends_on:
      - db

  frontend:
    image: nicolasbernal1/frontend-wdt:1
    container_name: frontend_app
    ports:
      - "4200:4200"
    depends_on:
      - backend

volumes:
  db_data: